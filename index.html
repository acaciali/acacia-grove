<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1d3557" />
    <title>Month Money</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="top">
      <div class="user-toggle" role="tablist" aria-label="Active user">
        <button class="user-btn" data-user="acacia" role="tab">Acacia</button>
        <button class="user-btn" data-user="david" role="tab">David</button>
      </div>
      <div class="balance" id="balance" aria-live="polite">$0.00</div>
      <div class="balance-label" id="balance-label"></div>
    </header>

    <main>
      <section class="buckets">
        <ul class="bucket-list" id="bucket-list"></ul>
      </section>

      <section class="actions">
        <button class="action-btn" id="month-btn">+$25 month</button>
        <button class="action-btn" id="holiday-btn">+$10 holiday</button>
        <button class="action-btn" id="custom-btn">+$ Custom</button>
        <form class="spend" id="spend-form" autocomplete="off">
          <span class="spend-prefix">Spend $</span>
          <input
            class="spend-input"
            id="spend-input"
            type="number"
            min="0"
            step="0.01"
            inputmode="decimal"
            placeholder="0.00"
            aria-label="Amount to spend"
          />
          <button class="spend-btn" type="submit">Subtract</button>
        </form>
      </section>

      <section class="chores">
        <input
          class="search"
          id="chore-search"
          type="search"
          placeholder="Search chores..."
          aria-label="Search chores"
        />
        <ul class="chore-list" id="chore-list"></ul>
      </section>

      <section class="history">
        <h2>Recent</h2>
        <ul class="history-list" id="history-list"></ul>
      </section>

      <section class="manage">
        <details>
          <summary>Manage buckets</summary>
          <form class="bucket-form" id="bucket-form" autocomplete="off">
            <input
              id="new-bucket-name"
              type="text"
              placeholder="New bucket name (e.g. California Trip)"
              required
            />
            <button type="submit">Add</button>
          </form>
          <ul class="manage-list" id="manage-buckets"></ul>
        </details>
      </section>

      <section class="manage">
        <details>
          <summary>Manage chores</summary>
          <form class="chore-form" id="chore-form" autocomplete="off">
            <input
              id="new-chore-name"
              type="text"
              placeholder="Chore name"
              required
            />
            <input
              id="new-chore-amount"
              type="number"
              min="0"
              step="0.01"
              inputmode="decimal"
              placeholder="$"
              required
            />
            <button type="submit">Add</button>
          </form>
          <ul class="manage-list" id="manage-list"></ul>
        </details>
      </section>
    </main>

    <div class="status" id="status" hidden></div>

    <div class="modal" id="holiday-modal" hidden role="dialog" aria-modal="true" aria-labelledby="holiday-title">
      <div class="modal-card">
        <h2 id="holiday-title" class="modal-title"></h2>
        <p class="modal-body" id="holiday-body"></p>
        <div class="modal-actions">
          <button class="modal-btn dismiss" id="holiday-dismiss" type="button">Not now</button>
          <button class="modal-btn apply" id="holiday-apply" type="button">Add $10</button>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
